name: CubeX Automated Tests

# Run this every time you push to main, or open a Pull Request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Boots up a blank Linux server

    steps:
    - name: Download the CubeX code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install system dependencies for headless Qt
      run: |
        sudo apt-get update
        sudo apt-get install -y libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 libegl1 libdbus-1-3

    - name: Install Python libraries
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-qt PyQt5 numpy scipy astropy matplotlib pyqtgraph

    - name: Run Pytest
      env:
        PYTHONPATH: src
        PYTEST_QT_API: pyqt5
        QT_QPA_PLATFORM: offscreen # Forces Qt to run without a real monitor
      run: |
        pytest tests/